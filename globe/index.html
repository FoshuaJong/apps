<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0e">
  <title>Joshua Fong — Globe</title>
  <meta name="description" content="Connect cities across the world. An interactive WebGL globe with draggable rotation and multi-city arc drawing.">
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/apps.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="grid-spotlight"></div>
  <!-- NAV -->
  <nav>
    <div class="container">
      <div class="nav-mark"><span><a href="https://joshua.fong.nz">JF</a></span> / <a href="https://apps.fong.nz">apps</a></div>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Apps</a></li>
        <li class="nav-sep"></li>
        <li><a href="/globe/" aria-current="page">Globe</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  
  <!-- PAGE -->
  <div class="globe-page">
    <div class="globe-page-left">
      <div class="globe-header">
        <h1>Globe</h1>
        <p>Share visualised city‑to‑city connections as great‑circle routes.</p>
      </div>

      <!-- CONTROLS -->
      <div class="globe-controls">
        <div class="field-group">
          <div class="field-label-row">
            <label class="field-label" id="labelCityA" for="cityA">Origin</label>
            <button class="custom-city-toggle" id="customCityToggle" type="button">+ custom</button>
          </div>
          <select id="cityA"><option value="">Loading…</option></select>
        </div>
        <div class="custom-city-form" id="customCityForm">
          <label class="field-label" for="customCityInput">City or place name</label>
          <div class="custom-city-row">
            <input type="text" id="customCityInput" placeholder="e.g. Reykjavik" autocomplete="off" spellcheck="false">
            <button class="btn-secondary" id="customCityLookupBtn" type="button">Look up</button>
          </div>
          <div id="lookupResults"></div>
        </div>
        
        <div class="swap-row">
          <button class="swap-btn" id="swapBtn" type="button" aria-label="Swap origin and destination" aria-pressed="false">Swap</button>
        </div>

        <div class="field-group">
          <label class="field-label" id="labelCityB" for="cityB">Destination</label>
          <select id="cityB"><option value="">Loading…</option></select>
        </div>

        <p class="globe-error" id="addError"></p>
        <div class="add-connection-row">
          <button class="btn-secondary" id="addBtn" disabled>Loading…</button>
        </div>
        <!-- <div class="field-group">
          <label class="field-label">Arc Color</label>
          <div class="color-picker-row" id="pickerArc" style="padding-left: 0; margin-bottom: 1rem;"></div>
        </div> -->
        
        <div class="connections-section">
          <div class="tab-bar">
            <button class="tab-btn active" id="tabConnections">Connections</button>
            <button class="tab-btn" id="tabCityLabels" disabled>Cities</button>
            <button class="tab-clear" id="tabClear">Clear all</button>
          </div>
          <div class="tab-panel active" id="panelConnections">
            <div id="connectionList">
              <p class="connection-empty">No connections yet.</p>
            </div>
          </div>
          <div class="tab-panel" id="panelCityLabels">
            <div id="cityLabelsList"></div>
          </div>
        </div>

        <div class="share-section">
          <div class="share-btn-row">
            <button class="btn-secondary" id="shareBtn" data-state="idle" onclick="shareGlobe()">Copy link</button>
            <button class="btn-secondary" id="exportBtn" onclick="exportGlobe()">Export</button>
            <button class="btn-secondary" id="importBtn" onclick="importGlobe()">Import</button>
          </div>
          <div id="shareUrlGhost" class="share-url-ghost"></div>
          <p class="share-status" id="shareStatus"></p>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div><!-- end .globe-controls -->

    </div><!-- end .globe-page-left -->

    <!-- GLOBE -->
    <div class="globe-wrapper">
      <div id="globeViz"></div>
    </div>
    <div id="rotateHint"></div>

  </div><!-- end .globe-page -->

  <!-- CONFIRM MODAL -->
  <div class="confirm-backdrop" id="confirmBackdrop" role="dialog" aria-modal="true" aria-labelledby="confirmMessage">
    <div class="confirm-box">
      <p class="confirm-eyebrow">Confirm</p>
      <p class="confirm-message" id="confirmMessage"></p>
      <div class="confirm-actions">
        <button class="btn-secondary" id="confirmCancel">Cancel</button>
        <button class="btn-secondary btn-confirm" id="confirmOk">Replace</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>&copy; 2026 Joshua Fong</p>
      <span class="footer-note"><a href="https://joshua.fong.nz">joshua.fong.nz</a></span>
    </div>
  </footer>

  <!-- MOBILE NAV -->

  <!-- GLOBE APP -->
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.45.1"></script>
  <script src="app.js" defer></script>
</body>
</html>

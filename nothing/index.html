<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joshua Fong — Nothing</title>
  <meta name="description" content="There's nothing here.">
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/apps.css">

  <style>
    .nothing-stage {
      position: relative;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    #fleeing-text {
      position: absolute;
      font-family: var(--font-display);
      font-size: clamp(0.95rem, 1.5vw, 1.25rem);
      color: var(--text-secondary);
      font-weight: 400;
      white-space: nowrap;
      user-select: none;
      pointer-events: none;
      will-change: transform;
      /* origin set by JS — roughly 1/3 from left, 50% down */
      top: 0;
      left: 0;
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div id="grid-spotlight"></div>
  <script>
    (function(){var g=document.getElementById('grid-spotlight');document.addEventListener('mousemove',function(e){g.style.setProperty('--mx',e.clientX+'px');g.style.setProperty('--my',e.clientY+'px');});document.addEventListener('mouseleave',function(){g.style.setProperty('--mx','-999px');g.style.setProperty('--my','-999px');});})();
  </script>

  <!-- NAV -->
  <nav>
    <div class="container">
      <div class="nav-mark"><span><a href="https://joshua.fong.nz">JF</a></span> / <a href="https://apps.fong.nz">apps</a></div>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Apps</a></li>
        <li class="nav-sep"></li>
        <li><a href="#" aria-current="page">Nothing</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nothing-stage" id="stage">
    <span id="fleeing-text">there's <a href="/nothing/something/" style="color: var(--accent); text-decoration: none; pointer-events: auto;">nothing</a> here</span>
  </div>

  <footer>
    <div class="container">
      <p>&copy; 2026 Joshua Fong</p>
      <span class="footer-note"><a href="https://joshua.fong.nz">joshua.fong.nz</a></span>
    </div>
  </footer>

  <script>
    // Mobile nav
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => navLinks.classList.remove('open'));
    });
  </script>

  <script>
    const el    = document.getElementById('fleeing-text');
    const stage = document.getElementById('stage');

    let anchorX = 0, anchorY = 0;
    let elX = 0, elY = 0;
    let stageX = 0, stageY = 0, stageW = 0, stageH = 0;
    let mx = -9999, my = -9999;
    let relocateCooldown = 0;

    // ── Constants ─────────────────────────────────────────────────
    // Pure lerp physics — no velocity, no spring, no oscillation.
    // Each frame the text moves LERP fraction toward its target position.
    const LERP          = 0.045;

    const REPEL_RADIUS  = 780;   // cursor awareness from text center (px)
    const MAX_PUSH      = 200;   // max displacement caused by cursor
    const EDGE_RADIUS   = 200;   // stage edge awareness (px)
    const MAX_EDGE_PUSH = 150;   // max displacement from edge force
    const GRAVITY       = 0.08;  // fraction of (center − anchor) added to target

    const RELOCATE_DISP = 55;
    const PATH_RADIUS   = 85;
    const RELOCATE_COOL = 50;
    const ANCHOR_DIST   = 160;
    const ANCHOR_MARGIN = 110;
    const CLICK_GAP     = 80;

    const SKEW_SCALE    = 0.018;
    const SQUEEZE_SCALE = 0.0012;

    // ── Layout ────────────────────────────────────────────────────
    function computeLayout() {
      const r = stage.getBoundingClientRect();
      stageX = r.left + window.scrollX;
      stageY = r.top  + window.scrollY;
      stageW = stage.offsetWidth;
      stageH = stage.offsetHeight;
    }

    function setOrigin() {
      computeLayout();
      el.style.left       = '0px';
      el.style.top        = '0px';
      el.style.marginLeft = -(el.offsetWidth  / 2) + 'px';
      el.style.marginTop  = -(el.offsetHeight / 2) + 'px';
      anchorX = stageX + stageW * 0.33;
      anchorY = stageY + stageH * 0.50;
      elX = anchorX; elY = anchorY;
    }

    window.addEventListener('resize', computeLayout);
    window.addEventListener('load', setOrigin);
    setOrigin();

    document.addEventListener('mousemove', e => { mx = e.pageX; my = e.pageY; });
    document.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });

    // Click: place anchor near cursor, between it and the current anchor
    document.addEventListener('click', e => {
      const cx = e.pageX, cy = e.pageY;
      const dx = anchorX - cx, dy = anchorY - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const gap  = dist > CLICK_GAP ? CLICK_GAP : Math.max(12, dist * 0.5);
      const nx   = dist > 0 ? dx / dist : 1;
      const ny   = dist > 0 ? dy / dist : 0;
      const c    = clampAnchor(cx + nx * gap, cy + ny * gap);
      anchorX = c.x; anchorY = c.y;
      relocateCooldown = RELOCATE_COOL;
    });

    function nearSegment(px, py, x1, y1, x2, y2, r) {
      const ax = x2-x1, ay = y2-y1, len2 = ax*ax+ay*ay;
      const t  = len2 > 0 ? Math.max(0, Math.min(1, ((px-x1)*ax+(py-y1)*ay)/len2)) : 0;
      return Math.hypot(px-(x1+t*ax), py-(y1+t*ay)) < r;
    }

    function clampAnchor(x, y) {
      return {
        x: Math.max(stageX + ANCHOR_MARGIN, Math.min(stageX + stageW - ANCHOR_MARGIN, x)),
        y: Math.max(stageY + ANCHOR_MARGIN, Math.min(stageY + stageH - ANCHOR_MARGIN, y)),
      };
    }

    // ── Main loop ──────────────────────────────────────────────────
    function tick() {
      const centerX = stageX + stageW * 0.5;
      const centerY = stageY + stageH * 0.5;

      // Cursor push — smooth quadratic falloff from text center
      const dx   = elX - mx, dy = elY - my;
      const dist = Math.sqrt(dx*dx + dy*dy);
      let pushX = 0, pushY = 0;
      if (dist < REPEL_RADIUS && dist > 0) {
        const t = 1 - dist / REPEL_RADIUS;
        const amt = MAX_PUSH * t * t;
        pushX = dx / dist * amt;
        pushY = dy / dist * amt;
      }

      // Edge push — quadratic, pushes text inward from stage boundaries
      const dL = elX - stageX,          dR = (stageX + stageW) - elX;
      const dT = elY - stageY,          dB = (stageY + stageH) - elY;
      if (dL < EDGE_RADIUS && dL > 0) { const t=1-dL/EDGE_RADIUS; pushX += MAX_EDGE_PUSH*t*t; }
      if (dR < EDGE_RADIUS && dR > 0) { const t=1-dR/EDGE_RADIUS; pushX -= MAX_EDGE_PUSH*t*t; }
      if (dT < EDGE_RADIUS && dT > 0) { const t=1-dT/EDGE_RADIUS; pushY += MAX_EDGE_PUSH*t*t; }
      if (dB < EDGE_RADIUS && dB > 0) { const t=1-dB/EDGE_RADIUS; pushY -= MAX_EDGE_PUSH*t*t; }

      // Gravity — biases target toward screen center
      const gravX = (centerX - anchorX) * GRAVITY;
      const gravY = (centerY - anchorY) * GRAVITY;

      // Target: anchor displaced by all forces; lerp toward it
      const targetX = anchorX + pushX + gravX;
      const targetY = anchorY + pushY + gravY;
      elX += (targetX - elX) * LERP;
      elY += (targetY - elY) * LERP;

      // Anchor relocation
      const dispX = elX - anchorX, dispY = elY - anchorY;
      const dispMag = Math.sqrt(dispX*dispX + dispY*dispY);

      if (relocateCooldown > 0) {
        relocateCooldown--;
      } else if (dispMag > RELOCATE_DISP &&
                 nearSegment(mx, my, elX, elY, anchorX, anchorY, PATH_RADIUS)) {
        const dh = dispX/dispMag, dv = dispY/dispMag;
        const c1 = clampAnchor(elX + (-dv)*ANCHOR_DIST, elY +   dh *ANCHOR_DIST);
        const c2 = clampAnchor(elX +   dv *ANCHOR_DIST, elY + (-dh)*ANCHOR_DIST);
        const score = c => -Math.hypot(c.x-centerX, c.y-centerY) + Math.hypot(c.x-mx, c.y-my)*0.5;
        const chosen = score(c1) >= score(c2) ? c1 : c2;
        anchorX = chosen.x; anchorY = chosen.y;
        relocateCooldown = RELOCATE_COOL;
      }

      // Stretch deformation from anchor
      const aDispX   = elX - anchorX;
      const aDispY   = elY - anchorY;
      const aDispMag = Math.sqrt(aDispX*aDispX + aDispY*aDispY);

      const skewX  =  aDispY * SKEW_SCALE;
      const skewY  = -aDispX * SKEW_SCALE * 0.5;
      const scaleY =  Math.max(0.75, 1 - aDispMag * SQUEEZE_SCALE);
      const scaleX =  1 + aDispMag * SQUEEZE_SCALE * 0.4;

      el.style.transform =
        `translate(${elX - stageX}px, ${elY - stageY}px)` +
        ` skew(${skewX}deg, ${skewY}deg)` +
        ` scaleX(${scaleX}) scaleY(${scaleY})`;

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>

</body>
</html>

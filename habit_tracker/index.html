<!DOCTYPE html>
<html lang="en" data-theme="terminal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0e" id="meta-theme-color">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Habits">
  <link rel="manifest" href="manifest.json">
  <title>Joshua Fong — Habit Tracker</title>
  <meta name="description" content="A month-at-a-glance habit tracker with notes, habits, and sleep visualisation.">
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/apps.css">
  <link rel="stylesheet" href="style.css">
</head>
<body id="habit-tracker">
  <div id="grid-spotlight"></div>
  <script>
    (function(){var g=document.getElementById('grid-spotlight');document.addEventListener('mousemove',function(e){g.style.setProperty('--mx',e.clientX+'px');g.style.setProperty('--my',e.clientY+'px');});document.addEventListener('mouseleave',function(){g.style.setProperty('--mx','-999px');g.style.setProperty('--my','-999px');});})();
  </script>

  <!-- NAV -->
  <nav>
    <div class="container">
      <div class="nav-mark"><span><a href="https://joshua.fong.nz">JF</a></span> / <a href="https://apps.fong.nz">apps</a></div>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Apps</a></li>
        <li class="nav-sep"></li>
        <li><a href="/habit_tracker/" aria-current="page">Habit Tracker</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- APP HEADER -->
  <header id="app-header">
    <div class="container">
      <div class="header-row">
        <button id="btn-prev-month" class="btn-month-nav" aria-label="Previous month">&#8592;</button>
        <h1 id="month-heading">April 2026</h1>
        <button id="btn-next-month" class="btn-month-nav" aria-label="Next month">&#8594;</button>
      </div>
      <div class="header-actions">
        <button id="btn-theme-toggle" class="btn-action">Paper</button>
        <button id="btn-shortcuts" class="btn-action">Shortcuts</button>
        <button id="btn-export" class="btn-action">Export</button>
        <label class="btn-action btn-import-label" id="btn-import-label">
          Import
          <input type="file" id="input-import" accept=".json">
        </label>
        <span id="import-error" class="import-error"></span>
      </div>
    </div>
  </header>

  <!-- MOBILE TABS -->
  <nav id="mobile-tabs" aria-label="Tracker sections">
    <button class="tab-btn active" data-tab="notes">Notes</button>
    <button class="tab-btn" data-tab="habits">Habits</button>
    <button class="tab-btn" data-tab="sleep">Sleep</button>
  </nav>

  <!-- TABLE -->
  <main id="tracker-main">
    <div class="container">
      <div class="table-scroll">
        <div class="table-wrapper">
          <table id="tracker-table">
            <colgroup id="table-colgroup"></colgroup>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
          <svg id="sleep-svg" aria-hidden="true"></svg>
        </div>
      </div>
    </div>
  </main>

  <!-- SHORTCUTS MODAL -->
  <dialog id="shortcuts-modal">
    <div class="modal-inner">
      <h2>One-tap shortcuts</h2>
      <p class="shortcuts-desc">Save a habit as a Home Screen icon — one tap to log it for today.</p>
      <div id="shortcuts-list"></div>
      <div class="modal-actions">
        <button id="shortcuts-close" class="btn-secondary">Close</button>
      </div>
    </div>
  </dialog>

  <!-- COLUMN MODAL -->
  <dialog id="col-modal">
    <div class="modal-inner">
      <h2 id="modal-title">Add column</h2>
      <label class="modal-field">
        <span>Name</span>
        <input type="text" id="modal-name" maxlength="40" autocomplete="off">
      </label>
      <label class="modal-field" id="modal-type-row">
        <span>Type</span>
        <select id="modal-type">
          <option value="check">Checkbox</option>
          <option value="text">Short text</option>
        </select>
      </label>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-save" class="btn-primary">Save</button>
      </div>
    </div>
  </dialog>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>&copy; 2026 Joshua Fong</p>
      <span class="footer-note"><a href="https://joshua.fong.nz">joshua.fong.nz</a></span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
